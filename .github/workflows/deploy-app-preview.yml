name: Deploy App Preview

on:
    push:
        branches:
            - cloud
    workflow_dispatch:

permissions:
    contents: read
    packages: write

env:
    REGISTRY: ghcr.io
    IMAGE_NAME: ${{ github.repository }}/app-preview
    CONTAINER_NAME: nao-app-preview
    PREVIEW_PORT: 5050
    DOMAIN: app.preview.getnao.io

jobs:
    deploy:
        name: Build & Deploy
        runs-on: ubuntu-latest

        steps:
            - uses: actions/checkout@v4

            - name: Get short SHA
              id: sha
              run: echo "short_sha=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Log in to GitHub Container Registry
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.REGISTRY }}
                  username: ${{ github.actor }}
                  password: ${{ secrets.GITHUB_TOKEN }}

            - name: Build and push image
              uses: docker/build-push-action@v6
              with:
                  context: .
                  push: true
                  tags: |
                      ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
                      ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.short_sha }}
                  cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache
                  cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:cache,mode=max
                  build-args: |
                      APP_VERSION=${{ github.ref_name }}
                      APP_COMMIT=${{ steps.sha.outputs.short_sha }}
                  secrets: |
                      GITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }}

            - name: Deploy to preview server
              uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
              with:
                  host: ${{ secrets.VM_HOST }}
                  username: github-actions-demo
                  key: ${{ secrets.PRIVATE_KEY }}
                  script: |
                      export IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.sha.outputs.short_sha }}"

                      echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

                      docker pull "$IMAGE"

                      docker rm -f "${{ env.CONTAINER_NAME }}" 2>/dev/null || true

                      docker volume create nao-app-preview-projects 2>/dev/null || true

                      docker run -d \
                          --name "${{ env.CONTAINER_NAME }}" \
                          -p "${{ env.PREVIEW_PORT }}:5005" \
                          -v nao-app-preview-projects:/app/projects \
                          -e "NAO_PROJECTS_DIR=/app/projects" \
                          -e "BETTER_AUTH_URL=https://${{ env.DOMAIN }}" \
                          -e "BETTER_AUTH_SECRET=${{ secrets.BETTER_AUTH_SECRET }}" \
                          -e "DB_SSL=true" \
                          -e "DB_URI=postgres://${{ secrets.POSTGRES_USER }}:${{ secrets.POSTGRES_PASSWORD }}@${{ secrets.POSTGRES_HOST }}:${{ secrets.POSTGRES_PORT }}/app" \
                          -e "NAO_MODE=cloud" \
                          -e "GITHUB_CLIENT_ID=${{ secrets.PREVIEW_GITHUB_CLIENT_ID }}" \
                          -e "GITHUB_CLIENT_SECRET=${{ secrets.PREVIEW_GITHUB_CLIENT_SECRET }}" \
                          -e "POSTHOG_DISABLED=true" \
                          -e "NAO_CONTEXT_SOURCE=api" \
                          -e "SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}" \
                          -e "SMTP_HOST=${{ secrets.SMTP_HOST }}" \
                          -e "SMTP_PORT=${{ secrets.SMTP_PORT }}" \
                          -e "SMTP_MAIL_FROM=${{ secrets.SMTP_MAIL_FROM }}" \
                          -e "SMTP_SSL=${{ secrets.SMTP_SSL }}" \
                          "$IMAGE"

                      echo "Waiting for container to start..."
                      sleep 10

                      # Configure nginx for app.preview.getnao.io
                      echo "\"~^app\" ${{ env.PREVIEW_PORT }};" > "/home/github-actions-demo/nginx/preview.d/app.conf"
                      docker exec nginx nginx -s reload

                      echo "Deployed at https://${{ env.DOMAIN }}"
